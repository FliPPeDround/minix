name: Bug 报告
description: 报告一个可复现的问题
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈！请尽量填全下面的信息，能让大家更快定位问题。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 简要说明发生了什么问题，以及你期望的行为是什么。
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 怎么触发这个问题？最好能贴最小可复现的代码 / WXML 片段。
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true

  - type: input
    id: minix-version
    attributes:
      label: minix 版本
      placeholder: 0.0.0 / commit hash
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: 运行环境
      placeholder: Node 22.x, pnpm 11.x, Chrome 130, macOS 14
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 报错日志 / 截图
      description: 控制台报错、构建报错或截图都可以贴这里。
      render: shell
