name: 功能建议
description: 提一个想加的能力或改进
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决什么问题
      description: 这个功能是为了解决什么场景下的什么痛点？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你期望的方案
      description: 简要描述你期望的 API 或行为，能贴伪代码更好。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 有没有其他思路？为什么没选？
